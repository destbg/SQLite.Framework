name: Coverage

on:
  push:
    branches: [main]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.targets'
      - 'Directory.Build.*'
      - 'Directory.Packages.*'
      - 'Tests/**'
      - 'SQLite.Framework*/**'
      - '.github/workflows/coverage.yml'

permissions:
  contents: read

jobs:
  test-results:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project:
          - SQLite.Framework.Tests
          - SQLite.Framework.Tests.Bundled
          - SQLite.Framework.Tests.Cipher
          - SQLite.Framework.Tests.Base
          - SQLite.Framework.Tests.SourceGenerator
    name: Test results (${{ matrix.project }})
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x
      - name: Run tests
        run: |
          dotnet run --project Tests/${{ matrix.project }}/${{ matrix.project }}.csproj -c Release \
            -- --report-xunit-junit \
               --report-xunit-junit-filename ${{ matrix.project }}.junit.xml \
               --results-directory TestResults
      - name: Upload test results artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: junit-${{ matrix.project }}
          path: TestResults/${{ matrix.project }}.junit.xml

  upload-test-results:
    runs-on: ubuntu-latest
    needs: [test-results]
    if: ${{ !cancelled() }}
    permissions:
      contents: read
    name: Upload test results to Codecov
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download all test result artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: junit-*
          merge-multiple: true
          path: TestResults
      - name: Upload combined test results to Codecov
        uses: codecov/test-results-action@v1.2.1
        with:
          files: TestResults/*.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project:
          - SQLite.Framework.Tests
          - SQLite.Framework.Tests.Bundled
          - SQLite.Framework.Tests.Cipher
          - SQLite.Framework.Tests.Base
          - SQLite.Framework.Tests.NoOp
          - SQLite.Framework.Tests.SourceGenerator
    name: Coverage (${{ matrix.project }})
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x
      - name: Install coverlet
        run: dotnet tool install --global coverlet.console
      - name: Build tests
        run: dotnet build Tests/${{ matrix.project }}/${{ matrix.project }}.csproj -c Release
      - name: Collect coverage
        run: |
          coverlet Tests/${{ matrix.project }}/bin/Release/net10.0/${{ matrix.project }}.dll \
            --target dotnet \
            --targetargs "exec Tests/${{ matrix.project }}/bin/Release/net10.0/${{ matrix.project }}.dll" \
            --include "[SQLite.Framework]*" \
            --format cobertura \
            --output coverage.cobertura.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ matrix.project }}
          path: coverage.cobertura.xml

  upload-coverage:
    runs-on: ubuntu-latest
    needs: [coverage]
    permissions:
      contents: read
    name: Merge and upload coverage to Codecov
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x
      - name: Download coverage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: coverage-*
          path: coverage-reports
      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool
      - name: Merge coverage reports
        run: |
          reportgenerator \
            "-reports:coverage-reports/**/coverage.cobertura.xml" \
            "-targetdir:merged-coverage" \
            "-reporttypes:Cobertura"
      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: merged-coverage/Cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          skip_validation: true

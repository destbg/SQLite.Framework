name: Deploy wiki to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: wiki

      - name: Build
        run: npm run build
        working-directory: wiki

      - name: Write Google Search Console verification file
        if: ${{ vars.GOOGLE_SITE_VERIFICATION_FILENAME != '' }}
        env:
          FILENAME: ${{ vars.GOOGLE_SITE_VERIFICATION_FILENAME }}
        run: |
          printf 'google-site-verification: %s\n' "$FILENAME" > "wiki/dist/$FILENAME"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: wiki/dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

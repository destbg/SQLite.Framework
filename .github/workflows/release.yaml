name: Release to Nuget

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.event.release.tag_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Pack SQLite.Framework
        run: dotnet pack -c Release /p:SQLiteFrameworkTesting=false "/p:Version=$TAG" "/p:PackageReleaseNotes=See https://github.com/destbg/SQLite.Framework/releases/tag/$TAG"
        working-directory: ./SQLite.Framework

      - name: Pack SQLite.Framework.Bundled
        run: dotnet pack -c Release /p:SQLiteFrameworkTesting=false "/p:Version=$TAG" "/p:PackageReleaseNotes=See https://github.com/destbg/SQLite.Framework/releases/tag/$TAG"
        working-directory: ./SQLite.Framework.Bundled

      - name: Pack SQLite.Framework.Cipher
        run: dotnet pack -c Release /p:SQLiteFrameworkTesting=false "/p:Version=$TAG" "/p:PackageReleaseNotes=See https://github.com/destbg/SQLite.Framework/releases/tag/$TAG"
        working-directory: ./SQLite.Framework.Cipher

      - name: Pack SQLite.Framework.Base
        run: dotnet pack -c Release /p:SQLiteFrameworkTesting=false "/p:Version=$TAG" "/p:PackageReleaseNotes=See https://github.com/destbg/SQLite.Framework/releases/tag/$TAG"
        working-directory: ./SQLite.Framework.Base

      - name: Pack SQLite.Framework.DependencyInjection
        run: dotnet pack -c Release /p:SQLiteFrameworkTesting=false "/p:Version=$TAG" "/p:PackageReleaseNotes=See https://github.com/destbg/SQLite.Framework/releases/tag/$TAG"
        working-directory: ./SQLite.Framework.DependencyInjection

      - name: Pack SQLite.Framework.SourceGenerator
        run: dotnet pack -c Release /p:SQLiteFrameworkTesting=false "/p:Version=$TAG" "/p:PackageReleaseNotes=See https://github.com/destbg/SQLite.Framework/releases/tag/$TAG"
        working-directory: ./SQLite.Framework.SourceGenerator

      - name: Archive NuGet Packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nuget-packages
          path: |
            SQLite.Framework/bin/Release/*.nupkg
            SQLite.Framework.Bundled/bin/Release/*.nupkg
            SQLite.Framework.Cipher/bin/Release/*.nupkg
            SQLite.Framework.Base/bin/Release/*.nupkg
            SQLite.Framework.DependencyInjection/bin/Release/*.nupkg
            SQLite.Framework.SourceGenerator/bin/Release/*.nupkg

      - name: Upload Packages to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG" \
            "SQLite.Framework/bin/Release/SQLite.Framework.${TAG}.nupkg" \
            "SQLite.Framework.Bundled/bin/Release/SQLite.Framework.Bundled.${TAG}.nupkg" \
            "SQLite.Framework.Cipher/bin/Release/SQLite.Framework.Cipher.${TAG}.nupkg" \
            "SQLite.Framework.Base/bin/Release/SQLite.Framework.Base.${TAG}.nupkg" \
            "SQLite.Framework.DependencyInjection/bin/Release/SQLite.Framework.DependencyInjection.${TAG}.nupkg" \
            "SQLite.Framework.SourceGenerator/bin/Release/SQLite.Framework.SourceGenerator.${TAG}.nupkg" \
            --clobber --repo "$GH_REPO"

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.nuget_api_key }}
        run: |
          for pkg in \
            "SQLite.Framework/bin/Release/SQLite.Framework.${TAG}.nupkg" \
            "SQLite.Framework.Bundled/bin/Release/SQLite.Framework.Bundled.${TAG}.nupkg" \
            "SQLite.Framework.Cipher/bin/Release/SQLite.Framework.Cipher.${TAG}.nupkg" \
            "SQLite.Framework.Base/bin/Release/SQLite.Framework.Base.${TAG}.nupkg" \
            "SQLite.Framework.DependencyInjection/bin/Release/SQLite.Framework.DependencyInjection.${TAG}.nupkg" \
            "SQLite.Framework.SourceGenerator/bin/Release/SQLite.Framework.SourceGenerator.${TAG}.nupkg"
          do
            dotnet nuget push "$pkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
          done

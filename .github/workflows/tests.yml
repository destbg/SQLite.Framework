name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - SQLite.Framework.Tests
          - SQLite.Framework.Tests.Bundled
          - SQLite.Framework.Tests.Cipher
          - SQLite.Framework.Tests.Base
          - SQLite.Framework.Tests.SourceGenerator
    name: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Run tests
        run: dotnet run --project Tests/${{ matrix.project }}/${{ matrix.project }}.csproj -c Release

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install coverlet
        run: dotnet tool install --global coverlet.console
      - name: Build tests
        run: dotnet build Tests/SQLite.Framework.Tests/SQLite.Framework.Tests.csproj -c Release
      - name: Collect coverage
        run: |
          coverlet Tests/SQLite.Framework.Tests/bin/Release/net10.0/SQLite.Framework.Tests.dll \
            --target dotnet \
            --targetargs "exec Tests/SQLite.Framework.Tests/bin/Release/net10.0/SQLite.Framework.Tests.dll" \
            --include "[SQLite.Framework]*" \
            --format cobertura \
            --output coverage.cobertura.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

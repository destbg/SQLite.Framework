name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: SQLite.Framework.Tests
            flag: main
          - project: SQLite.Framework.Tests.Bundled
            flag: bundled
          - project: SQLite.Framework.Tests.Cipher
            flag: cipher
          - project: SQLite.Framework.Tests.Base
            flag: base
          - project: SQLite.Framework.Tests.SourceGenerator
            flag: sourcegen
    name: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Run tests
        run: |
          dotnet run --project Tests/${{ matrix.project }}/${{ matrix.project }}.csproj -c Release \
            -- --report-trx --results-directory TestResults
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: TestResults/*.trx
          flags: ${{ matrix.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: SQLite.Framework.Tests
            flag: main
          - project: SQLite.Framework.Tests.Bundled
            flag: bundled
          - project: SQLite.Framework.Tests.Cipher
            flag: cipher
          - project: SQLite.Framework.Tests.Base
            flag: base
          - project: SQLite.Framework.Tests.NoOp
            flag: noop
          - project: SQLite.Framework.Tests.SourceGenerator
            flag: sourcegen
    name: Coverage (${{ matrix.flag }})
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install coverlet
        run: dotnet tool install --global coverlet.console
      - name: Build tests
        run: dotnet build Tests/${{ matrix.project }}/${{ matrix.project }}.csproj -c Release
      - name: Collect coverage
        run: |
          coverlet Tests/${{ matrix.project }}/bin/Release/net10.0/${{ matrix.project }}.dll \
            --target dotnet \
            --targetargs "exec Tests/${{ matrix.project }}/bin/Release/net10.0/${{ matrix.project }}.dll" \
            --include "[SQLite.Framework]*" \
            --format cobertura \
            --output coverage.cobertura.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.cobertura.xml
          flags: ${{ matrix.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>SQLite.Framework: LINQ-friendly ORM for SQLite in .NET</title>
    <script>
        (function () {
            var l = window.location;
            var path = l.pathname.slice(1);
            var origin = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
            var spaPrefixes = ['Docs/', 'Walkthrough/'];
            for (var i = 0; i < spaPrefixes.length; i++) {
                var prefix = spaPrefixes[i];
                if (path.indexOf(prefix) === 0) {
                    var rest = path.slice(prefix.length);
                    l.replace(
                        origin + '/' + prefix + '?p=' + encodeURIComponent(rest) +
                        (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
                        l.hash
                    );
                    return;
                }
            }
            l.replace(origin + '/');
        })();
    </script>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>

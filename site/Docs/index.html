    <script>
        (function () {
            var l = window.location;
            if (l.search.indexOf('p=') !== -1) {
                var params = {};
                l.search.slice(1).split('&').forEach(function (kv) {
                    var i = kv.indexOf('=');
                    if (i > 0) params[kv.slice(0, i)] = kv.slice(i + 1);
                });
                if (params.p !== undefined) {
                    var path = '/Docs/' + decodeURIComponent(params.p);
                    var query = params.q ? '?' + decodeURIComponent(params.q) : '';
                    window.history.replaceState(null, '', path + query + l.hash);
                }
            }
        })();
    </script>
